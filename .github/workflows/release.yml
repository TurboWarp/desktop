name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  call-build:
    uses: ./.github/workflows/build.yml

  create-release:
    needs: [call-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          FILES=(linux/*.deb linux/*.tar.gz linux/*.AppImage mac/*.dmg windows/*.exe windows/*.appx)
          if [ ${#FILES[@]} -gt 0 ]; then
            gh release create "${{ github.ref_name }}" "${FILES[@]}" \
              --title "${{ github.ref_name }}" \
              --generate-notes
          else
            echo "No files found to upload"
            exit 1
          fi
